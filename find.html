<body>
    <h1>FIND</h1>
    <p><strong>Explicación:</strong> Busca archivos y directorios en el sistema de archivos.</p>
    <p><strong>Ejemplo:</strong> <code>find /home -name "*.txt"</code> busca todos los archivos .txt en /home.</p>
</body>
