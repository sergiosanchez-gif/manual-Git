<body>
    <h1>CHMOD</h1>
    <p><strong>Explicación:</strong> Cambia los permisos de archivos o directorios.</p>
    <p><strong>Ejemplo:</strong> <code>chmod 755 script.sh</code> da permisos de lectura/ejecución a todos y escritura al dueño.</p>
</body>
