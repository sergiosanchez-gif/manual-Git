<body>
    <h1>GREP</h1>
    <p><strong>Explicación:</strong> Busca líneas que coincidan con un patrón en archivos.</p>
    <p><strong>Ejemplo:</strong> <code>grep "error" log.txt</code> muestra líneas con "error".</p>
</body>
